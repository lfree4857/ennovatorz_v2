<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300" [class.bg-dark-950/80]="isScrolled()"
  [class.backdrop-blur-xl]="isScrolled()" [class.border-b]="isScrolled()" [class.border-dark-700/50]="isScrolled()">
  <nav class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-2 group" (click)="closeMobileMenu()">
      <img src="logo/innovators.webp" alt="Innovators Logo" class="h-12 md:h-14 w-auto object-contain" />
    </a>

    <!-- Desktop Nav -->
    <div class="hidden lg:flex items-center gap-1">
      @for (link of navLinks; track link.path) {
      <a [routerLink]="link.path" routerLinkActive="text-primary-400"
        [routerLinkActiveOptions]="{exact: link.path === '/'}"
        class="px-3 py-2 text-sm text-dark-300 hover:text-dark-50 rounded-lg hover:bg-dark-800/50 transition-all duration-200">
        {{ link.label }}
      </a>
      }
    </div>

    <!-- Desktop CTA -->
    <div class="hidden lg:flex items-center gap-3">
      <a routerLink="/contact" class="btn-primary text-sm px-5 py-2.5">
        Start Your Project
      </a>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="lg:hidden flex flex-col gap-1.5 p-2" (click)="toggleMobileMenu()" aria-label="Toggle menu"
      [attr.aria-expanded]="isMobileMenuOpen()" aria-controls="mobile-menu">
      <span class="w-6 h-0.5 bg-dark-50 transition-all duration-300" [class.rotate-45]="isMobileMenuOpen()"
        [class.translate-y-2]="isMobileMenuOpen()"></span>
      <span class="w-6 h-0.5 bg-dark-50 transition-all duration-300" [class.opacity-0]="isMobileMenuOpen()"></span>
      <span class="w-6 h-0.5 bg-dark-50 transition-all duration-300" [class.-rotate-45]="isMobileMenuOpen()"
        [class.-translate-y-2]="isMobileMenuOpen()"></span>
    </button>
  </nav>

  <!-- Mobile Menu -->
  @if (isMobileMenuOpen()) {
  <div id="mobile-menu" class="lg:hidden bg-dark-950/95 backdrop-blur-xl border-t border-dark-700/50">
    <div class="px-6 py-4 flex flex-col gap-1">
      @for (link of navLinks; track link.path) {
      <a [routerLink]="link.path" routerLinkActive="text-primary-400 bg-dark-800/50"
        [routerLinkActiveOptions]="{exact: link.path === '/'}"
        class="px-4 py-3 text-dark-300 hover:text-dark-50 rounded-lg hover:bg-dark-800/50 transition-all duration-200"
        (click)="closeMobileMenu()">
        {{ link.label }}
      </a>
      }
      <a routerLink="/contact" class="btn-primary text-center mt-4" (click)="closeMobileMenu()">
        Start Your Project
      </a>
    </div>
  </div>
  }
</header>
