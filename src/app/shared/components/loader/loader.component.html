@if (loaderService.isLoading()) {
  <div class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-dark-950/95 backdrop-blur-md loader-overlay">
    <div class="relative flex flex-col items-center justify-center p-12">
      <!-- Outer glowing rings -->
      <div class="absolute inset-0 rounded-full border-t-4 border-primary-500/80 spin-fast w-48 h-48 -m-6 md:-m-2 mx-auto pointer-events-none"></div>
      <div class="absolute inset-0 rounded-full border-b-4 border-cyan-400/80 spin-slow w-48 h-48 -m-6 md:-m-2 mx-auto pointer-events-none"></div>
      <div class="absolute inset-0 rounded-full border-l-4 border-purple-500/50 spin-reverse w-40 h-40 m-[-10px] md:m-[14px] mx-auto pointer-events-none"></div>
      
      <!-- Center content -->
      <div class="text-4xl md:text-5xl font-extrabold tracking-wider text-white mb-4 relative z-10 drop-shadow-[0_0_15px_rgba(51,132,228,0.5)]">
        Ennovator<span class="text-primary-500">z</span>
      </div>
      <div class="text-xs md:text-sm font-semibold tracking-[0.3em] text-cyan-300 uppercase relative z-10 opacity-90 pulse-text">
        Innovation and Creativity
      </div>
    </div>
  </div>
}
